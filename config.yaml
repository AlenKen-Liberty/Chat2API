server:
  host: "0.0.0.0"       # 开放给 Tailscale 局域网 (100.x.x.x)
  port: 7860

# ═══════════════════════════════════════════════════════════════
# Provider 元数据
# quota_group: 所有同 provider 模型共享的配额组标识
# best_model:  当指定 provider 名称时，实际使用的模型 ID
# fallback:    当本 provider 所有账号/key 耗尽时，切到哪个 provider
#
# Fallback chain: gemini → codex → copilot → groq → gemini (循环)
# ═══════════════════════════════════════════════════════════════
providers:
  gemini:
    quota_group: "gemini-all"
    best_model: "gemini-3.1-pro-preview"
    fallback: "codex"

  codex:
    quota_group: "codex-weekly"
    best_model: "gpt-5.4"
    fallback: "copilot"

  copilot:
    quota_group: "copilot-daily"
    best_model: "gpt-4o"
    fallback: "groq"

  groq:
    quota_group: "groq-free"
    best_model: "llama-3.3-70b-versatile"
    fallback: "gemini"

# ═══════════════════════════════════════════════════════════════
# 用户可见模型名称映射
#
# 主别名（推荐）：
#   "gemini"  → gemini-3.1-pro-preview (Gemini CLI OAuth)
#   "codex"   → gpt-5.4 (Codex OAuth via chatgpt.com)
#   "copilot" → gpt-4o (GitHub Copilot OAuth, 属于 included model)
#   "groq"    → llama-3.3-70b-versatile (Groq 免费, 14400 req/day)
#
# 语义别名：
#   "smart"   → gemini 最强模型
#   "fast"    → groq 最快模型 (不浪费高级配额)
#   "code"    → codex 代码专用模型
# ═══════════════════════════════════════════════════════════════
models:
  # ── 主别名（推荐使用）──
  gemini:
    provider: gemini
    model_id: "gemini-3.1-pro-preview"

  codex:
    provider: codex
    model_id: "gpt-5.4"

  copilot:
    provider: copilot
    model_id: "gpt-4o"

  groq:
    provider: groq
    model_id: "llama-3.3-70b-versatile"

  # ── 语义别名（按用途选择）──
  smart:
    provider: gemini
    model_id: "gemini-3.1-pro-preview"

  fast:
    provider: groq
    model_id: "llama-3.3-70b-versatile"

  code:
    provider: codex
    model_id: "gpt-5.4"

  # ── 语义别名：Gemini ──
  gemini-thinking:
    provider: gemini
    model_id: "gemini-3.1-pro-preview"

  gemini-balanced:
    provider: gemini
    model_id: "gemini-3-flash-preview"

  gemini-fast:
    provider: gemini
    model_id: "gemini-3.1-flash-lite-preview"

  gemini-pro:
    provider: gemini
    model_id: "gemini-3.1-pro-preview"

  gemini-flash:
    provider: gemini
    model_id: "gemini-3-flash-preview"

  gemini-lite:
    provider: gemini
    model_id: "gemini-3.1-flash-lite-preview"

  # ── 语义别名：Codex ──
  codex-thinking:
    provider: codex
    model_id: "gpt-5.4"

  codex-balanced:
    provider: codex
    model_id: "gpt-5.3-codex"

  codex-fast:
    provider: codex
    model_id: "gpt-5.1-codex-mini"

  # ── Copilot 上的模型（不消耗 Gemini/Codex 配额）──
  # 2026-03 GitHub Docs: paid plans / Copilot Student 下，GPT-4o 与 GPT-4.1
  # 是 included chat models；premium 模型消耗 monthly premium requests，
  # 且按模型 multiplier 扣减（不是所有 premium 模型都固定 1 次/调用）。
  copilot-gpt4o:
    provider: copilot
    model_id: "gpt-4o"

  copilot-gpt4o-mini:
    provider: copilot
    model_id: "gpt-4o-mini"

  copilot-claude:
    provider: copilot
    model_id: "claude-sonnet-4.5"

  copilot-claude-opus:
    provider: copilot
    model_id: "claude-opus-4.5"

  copilot-gemini:
    provider: copilot
    model_id: "gemini-2.5-pro"

  copilot-gpt41:
    provider: copilot
    model_id: "gpt-4.1"

  # ── Groq 免费模型（14400 req/day，适合简单任务）──
  groq-llama:
    provider: groq
    model_id: "llama-3.3-70b-versatile"

  groq-llama-small:
    provider: groq
    model_id: "llama-3.1-8b-instant"

  groq-llama4:
    provider: groq
    model_id: "meta-llama/llama-4-scout-17b-16e-instruct"

  # ── Gemini 完整模型列表 ──
  gemini-3.1-pro-preview:
    provider: gemini
    model_id: "gemini-3.1-pro-preview"

  gemini-3-pro-preview:
    provider: gemini
    model_id: "gemini-3-pro-preview"

  gemini-2.5-pro:
    provider: gemini
    model_id: "gemini-2.5-pro"

  gemini-3-flash-preview:
    provider: gemini
    model_id: "gemini-3-flash-preview"

  gemini-2.5-flash:
    provider: gemini
    model_id: "gemini-2.5-flash"

  gemini-3.1-flash-lite-preview:
    provider: gemini
    model_id: "gemini-3.1-flash-lite-preview"

  gemini-2.5-flash-lite:
    provider: gemini
    model_id: "gemini-2.5-flash-lite"

  # ── Codex 完整模型列表 ──
  gpt-5.4:
    provider: codex
    model_id: "gpt-5.4"

  gpt-5.4-mini:
    provider: codex
    model_id: "gpt-5.4-mini"

  gpt-5.3-codex:
    provider: codex
    model_id: "gpt-5.3-codex"

  gpt-5.2-codex:
    provider: codex
    model_id: "gpt-5.2-codex"

  gpt-5.2:
    provider: codex
    model_id: "gpt-5.2"

  gpt-5.1-codex-max:
    provider: codex
    model_id: "gpt-5.1-codex-max"

  gpt-5.1-codex-mini:
    provider: codex
    model_id: "gpt-5.1-codex-mini"

  gpt-oss-120b:
    provider: codex
    model_id: "gpt-oss-120b"

  gpt-oss-20b:
    provider: codex
    model_id: "gpt-oss-20b"

# ═══════════════════════════════════════════════════════════════
# 反检测配置
# ═══════════════════════════════════════════════════════════════
anti_detection:
  tls_strategy: "native"       # native | node | chrome | sidecar
  tls_impersonate:             # curl_cffi impersonate target
  max_rpm_per_account: 10
  single_concurrency: true

# ═══════════════════════════════════════════════════════════════
# 配额管理
# ═══════════════════════════════════════════════════════════════
quota:
  cache_ttl: 60
  safety_threshold: 40
  check_interval: 300
  refresh_retry_interval: 600

# ═══════════════════════════════════════════════════════════════
# 使用日志 (usage logging)
# 记录每次调用：调用者 IP、请求模型、实际模型、provider、耗时
# ═══════════════════════════════════════════════════════════════
logging:
  usage_log: "logs/usage.jsonl"   # JSONL 格式使用日志
  level: "INFO"
